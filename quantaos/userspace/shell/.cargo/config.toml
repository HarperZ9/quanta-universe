[build]
target = "../x86_64-quantaos-user.json"

[target.'cfg(target_os = "none")']
linker = "rust-lld"
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=--gc-sections",
    "-C", "relocation-model=static",
    "-C", "code-model=small",
]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
