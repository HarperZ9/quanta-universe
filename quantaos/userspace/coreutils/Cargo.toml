path = "src/bin/pwd.rs"

[[bin]]
name = "ln"
path = "src/bin/ln.rs"

[[bin]]
name = "chmod"
path = "src/bin/chmod.rs"

[[bin]]
name = "chown"
path = "src/bin/chown.rs"

[[bin]]
name = "stat"
path = "src/bin/stat.rs"

[[bin]]
name = "readlink"
path = "src/bin/readlink.rs"

[[bin]]
name = "basename"
path = "src/bin/basename.rs"

[[bin]]
name = "dirname"
path = "src/bin/dirname.rs"

[[bin]]
