[build]
target = "x86_64-quantaos.json"

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-quantaos]
runner = "qemu-system-x86_64 -kernel"
rustflags = ["-C", "link-arg=-no-pie"]
