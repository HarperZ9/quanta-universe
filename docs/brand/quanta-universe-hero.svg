<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Quanta Universe ecosystem hero</title>
  <desc id="desc">A modular ecosystem map linking BuildLang, rendering, color, operating-system, finance, and organism verification modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111d"/>
      <stop offset="0.52" stop-color="#101f32"/>
      <stop offset="1" stop-color="#241d35"/>
    </linearGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00b3a4"/>
      <stop offset="0.5" stop-color="#7a83ff"/>
      <stop offset="1" stop-color="#f0b65a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <g opacity="0.28" stroke="#30445f" stroke-width="1">
    <path d="M0 90h1200M0 160h1200M0 230h1200M0 300h1200M0 370h1200"/>
    <path d="M120 0v420M240 0v420M360 0v420M480 0v420M600 0v420M720 0v420M840 0v420M960 0v420M1080 0v420"/>
  </g>
  <g fill="none" stroke="url(#link)" stroke-width="5" opacity="0.85">
    <path d="M600 204L296 132M600 204L318 282M600 204L888 124M600 204L900 282M600 204L600 92M600 204L600 320"/>
  </g>
  <g fill="none" stroke="url(#link)" stroke-width="18" opacity="0.14" filter="url(#soft)">
    <path d="M600 204L296 132M600 204L318 282M600 204L888 124M600 204L900 282M600 204L600 92M600 204L600 320"/>
  </g>
  <circle cx="600" cy="204" r="78" fill="#10243a" stroke="#7a83ff" stroke-width="5"/>
  <circle cx="296" cy="132" r="48" fill="#0f2b35" stroke="#00b3a4" stroke-width="4"/>
  <circle cx="318" cy="282" r="48" fill="#291f36" stroke="#f0b65a" stroke-width="4"/>
  <circle cx="888" cy="124" r="48" fill="#11263c" stroke="#7a83ff" stroke-width="4"/>
  <circle cx="900" cy="282" r="48" fill="#2b2030" stroke="#f0647a" stroke-width="4"/>
  <circle cx="600" cy="92" r="44" fill="#17283b" stroke="#d0d8f5" stroke-width="4"/>
  <circle cx="600" cy="320" r="44" fill="#17283b" stroke="#b6d957" stroke-width="4"/>
  <text x="540" y="198" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Build</text>
  <text x="538" y="230" fill="#cdd8f4" font-family="Inter, Arial, sans-serif" font-size="18">ecosystem</text>
  <text x="252" y="138" fill="#eaf7ff" font-family="Inter, Arial, sans-serif" font-size="18">color</text>
  <text x="273" y="288" fill="#eaf7ff" font-family="Inter, Arial, sans-serif" font-size="18">kernel</text>
  <text x="848" y="130" fill="#eaf7ff" font-family="Inter, Arial, sans-serif" font-size="18">render</text>
  <text x="860" y="288" fill="#eaf7ff" font-family="Inter, Arial, sans-serif" font-size="18">finance</text>
  <text x="566" y="98" fill="#eaf7ff" font-family="Inter, Arial, sans-serif" font-size="18">buildc</text>
  <text x="560" y="326" fill="#eaf7ff" font-family="Inter, Arial, sans-serif" font-size="18">verify</text>
  <text x="108" y="370" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">Quanta Universe</text>
  <text x="500" y="370" fill="#d5deec" font-family="Inter, Arial, sans-serif" font-size="24">legacy modules mapped into the Build ecosystem</text>
