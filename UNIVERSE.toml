type = "stdlib"
language = "quanta"
description = "Core Standard Library (23,000+ lines)"
value_min = 200_000
value_max = 400_000
dependencies = ["quantalang"]
submodules = [
    "collections",
    "math",
    "io",
    "net",
    "sync",
    "time",
    "crypto",
    "text",
    "regex",
    "compression",
    "random",
    "serialization"
]

