type = "compiler"
language = "rust"
description = "The QuantaLang Compiler and Runtime"
patents = ["P001", "P002", "P003"]
value_min = 500_000
value_max = 1_500_000
dependencies = []

[[layers.foundation.modules]]
name = "foundation"
