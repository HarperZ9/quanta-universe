# Package index for publishable nested repos.
#
# This registry is the outward-facing boundary for module-level packaging.
# Keep this list in sync with CATALOG.json entries that have a dedicated
# GitHub repository.
#
# Fields:
# - name: display title
# - slug: repo/package slug (lowercase, hyphenated)
# - source: repo-relative source directory
# - language: primary implementation language
# - repository: canonical publish target
# - publish: whether this module is currently published as a candidate package
#

