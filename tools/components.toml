# Verifiable components of the Quanta organism.
#
# tools/verify_organism.py runs each component verify command in its path and
# reports ground truth -- what actually builds and passes here, not what the
# prose docs claim. New real (non-sketch) modules register here as they land,
# which is how the organism grows cohesively instead of by assertion.
#
# Fields:
#   name      unique id
#   path      directory (relative to repo root) to run verify in
#   language  rust | c | cpp | python | quanta
#   tier      0 = foundational, 1 = load-bearing (see STATUS.md)
#   verify    shell command; exit 0 means success
#   expect    "tested" = runtime-verified (tests run and pass);
#             "build"  = compile/link only (runtime verified against a target)
#   requires  optional toolchain gate: "msvc"
#   heavy     optional bool; skipped under --quick
#   note      optional human note

[[component]]
name = "frametrace-core"
path = "photon/frametrace"
language = "rust"
tier = 1
verify = "cargo test --offline"
expect = "tested"
note = "binding table + hazard model + C ABI + trace ingestion (18 tests)"

[[component]]
name = "frametrace-c-abi"
path = "photon/frametrace"
language = "c"
tier = 1
requires = "msvc"
verify = 'c_demo\build.bat'
expect = "build"
note = "C program links the staticlib and drives the tracer"

[[component]]
name = "frametrace-hook"
path = "photon/frametrace"
language = "cpp"
tier = 1
requires = "msvc"
verify = 'hook\build.bat'
expect = "build"
note = "D3D11 vtable hook DLL; runtime verified by injection into a live app"

[[component]]
name = "frametrace-adapter"
path = "photon/frametrace/adapters"
language = "python"
tier = 1
verify = "python -m py_compile renderdoc_to_frametrace.py"
expect = "build"
note = "RenderDoc capture -> JSON trace; runtime needs a live capture"

[[component]]
name = "quantalang"
path = "quantalang/compiler"
language = "rust"
tier = 0
verify = "cargo test --offline"
expect = "tested"
heavy = true
note = "foundational compiler (separate repo; absent in CI). ~612 tests, ~20s."
