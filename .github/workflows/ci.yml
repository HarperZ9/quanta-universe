name: QUANTA-UNIVERSE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count .quanta files
        run: |
          count=$(find . -name "*.quanta" -type f | wc -l)
          echo "Found $count .quanta files"
          if [ "$count" -lt 100 ]; then
            echo "ERROR: Expected 100+ .quanta files, found $count"
            exit 1
          fi

      - name: Validate module structure
        run: |
          for module in foundation spectrum photon oracle axiom lumina prism; do
            if [ ! -d "$module" ]; then
              echo "ERROR: Missing module directory: $module"
              exit 1
            fi
            echo "OK: $module/"
          done

      - name: Check for secrets
        run: |
          ! grep -rE "(api[_-]?key|secret|password|token)\s*=\s*['\"][^'\"]{8,}['\"]" \
            --include="*.quanta" --include="*.toml" --include="*.md" \
            --exclude-dir=.git --exclude-dir=quantalang --exclude-dir=harper-engine . \
            || true

  lint:
    name: Lint .quanta files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file encoding (UTF-8)
        run: |
          bad=0
          while IFS= read -r f; do
            if ! file "$f" | grep -qE "(UTF-8|ASCII|empty)"; then
              echo "WARNING: Non-UTF-8 encoding: $f"
              bad=$((bad + 1))
            fi
          done < <(find . -name "*.quanta" -type f | head -50)
          echo "Checked 50 files, $bad encoding issues"

      - name: Check for trailing whitespace
        run: |
          count=$(find . -name "*.quanta" -type f -exec grep -l '[[:space:]]$' {} \; | wc -l)
          echo "Files with trailing whitespace: $count"
